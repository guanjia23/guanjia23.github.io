<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图书商城</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            list-style: none;
            text-decoration: none;
        }

        body {
            font-family: "微软雅黑";
            background: #f5f5f5;
        }

       
        .header {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: bold;
        }

        .logo img {
            height: 40px;
        }

        .nav a {
            color: white;
            margin: 0 10px;
        }

        .header-icon {
            font-size: 20px;
            margin: 0 10px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .header-icon:hover {
            transform: rotate(360deg);
        }

        
        .login-btn {
            padding: 6px 14px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .login-btn:hover {
            background: #2980b9;
            transform: scale(1.05);
        }

      
        .login-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .modal-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 8px;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }

        .modal-box h3 {
            text-align: center;
            margin-bottom: 20px;
        }

        .modal-box input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .modal-box button {
            width: 100%;
            padding: 10px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }

        .modal-box p {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .main {
            width: 1200px;
            margin: 30px auto;
            display: flex;
            gap: 20px;
        }

        .left-sidebar {
            width: 200px;
            background: white;
            padding: 20px;
            border: 1px solid #eee;
        }

        .left-sidebar h3 {
            margin-bottom: 15px;
        }

        .left-sidebar li {
            margin: 10px 0;
        }

        .center {
            flex: 1;
        }

        .hot, .new-books {
            background: white;
            padding: 20px;
            border: 1px solid #eee;
            margin-bottom: 20px;
        }

        .book-list {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .book-item {
            text-align: center;
            padding: 10px;
            transition: all 0.3s ease;
        }

      
        .book-item:hover {
            transform: translateX(5px) scale(1.05);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .book-item img {
            width: 120px;
            height: 160px;
            object-fit: cover;
            border: 1px solid #eee;
        }

        .new-books table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
            text-align: center;
        }

        .new-books th, .new-books td {
            border: 1px solid #ccc;
            padding: 8px;
        }

        .right-sidebar {
            width: 220px;
            background: white;
            padding: 20px;
            border: 1px solid #eee;
            text-align: center;
        }

        
        .carousel {
            width: 100%;
            height: 160px;
            margin: 15px 0;
            position: relative;
            overflow: hidden;
            background: #f8f8f8;
        }

       
        .carousel img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            object-fit: contain; 
            opacity: 0;
            animation: slideUp 12s infinite linear;
        }


        .carousel img:nth-child(1) { animation-delay: 0s; }
        .carousel img:nth-child(2) { animation-delay: 4s; }
        .carousel img:nth-child(3) { animation-delay: 8s; }


        @keyframes slideUp {
            0% {
                opacity: 0;
                transform: translate(-50%, 100%);
            }
            8% {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
            25% {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
            33% {
                opacity: 0;
                transform: translate(-50%, -200%);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -200%);
            }
        }

    </style>
</head>
<body>
    <div class="login-modal" id="loginModal">
        <div class="modal-box">
            <span class="close-btn" onclick="closeModal()">×</span>
            <div id="loginForm">
                <h3>用户登录</h3>
                <input type="text" id="loginUser" placeholder="请输入用户名">
                <input type="password" id="loginPwd" placeholder="请输入密码">
                <button onclick="doLogin()">登录</button>
                <p>没有账号？<a href="javascript:void(0)" onclick="showReg()">立即注册</a></p>
            </div>
            <div id="regForm" style="display: none;">
                <h3>用户注册</h3>
                <input type="text" id="regUser" placeholder="请输入用户名">
                <input type="password" id="regPwd" placeholder="请输入密码">
                <button onclick="doReg()">注册</button>
                <p>已有账号？<a href="javascript:void(0)" onclick="showLogin()">返回登录</a></p>
            </div>
        </div>
    </div>
    <div class="header">
        <div class="logo">
            <img src="./img/logo.jpg" alt="logo">
            <span>doro的书店</span>
        </div>
        <div class="nav">
            <a href="#category">图书分类</a>
            <a href="#hot">热销推荐</a>
            <a href="#new">新书上市</a>
        </div>
        <span class="header-icon">🛒</span>
        <span class="header-icon">🔍</span>
        <button class="login-btn" onclick="openModal()">登录/注册</button>
    </div>
    <div class="main">
        <div class="left-sidebar" id="category">
            <h3>图书分类导航</h3>
            <ul>
                <li>文学小说</li>
                <li>科技计算机</li>
                <li>经济管理</li>
                <li>历史人文</li>
                <li>少儿读物</li>
            </ul>
        </div>

        <div class="center">
            <div class="hot" id="hot">
                <h3>热门推荐</h3>
                <div class="book-list">
                    <div class="book-item">
                        <img src="./img/1.jpg" alt="图书1">
                        <p>《深入理解计算机系统》</p>
                    </div>
                    <div class="book-item">
                        <img src="./img/2.jpg" alt="图书2">
                        <p>《算法导论》</p>
                    </div>
                    <div class="book-item">
                        <img src="./img/3.jpg" alt="图书3">
                        <p>《数据结构与算法分析》</p>
                    </div>
                    <div class="book-item">
                        <img src="./img/4.jpg" alt="图书4">
                        <p>《剑来》</p>
                    </div>
                </div>
            </div>

            <div class="new-books" id="new">
                <h3>新书上市</h3>
                <table>
                    <tr>
                        <th>书名</th>
                        <th>作者</th>
                        <th>价格</th>
                        <th>上架时间</th>
                    </tr>
                    <tr>
                        <td>《网页设计基础与实战》</td>
                        <td>何勇 王瑶</td>
                        <td>¥49.00</td>
                        <td>2026-04-01</td>
                    </tr>
                    <tr>
                        <td>《计算机组成原理》</td>
                        <td>唐朔飞</td>
                        <td>¥59.00</td>
                        <td>2026-04-20</td>
                    </tr>
                    <tr>
                        <td>《python教程》</td>
                        <td>三剑客</td>
                        <td>¥49.00</td>
                        <td>2026-04-25</td>
                    </tr>
                </table>
            </div>
        </div>
        <div class="right-sidebar">
            <h3>促销信息</h3>
            <div class="carousel">
                <img src="./img/ad1.jpg" alt="广告1">
                <img src="./img/ad2.jpg" alt="广告2">
                <img src="./img/ad3.jpg" alt="广告3">
            </div>
            
        </div>
    </div>

    <script>
        function openModal() {
            document.getElementById('loginModal').style.display = 'block';
        }
        function closeModal() {
            document.getElementById('loginModal').style.display = 'none';
        }
        window.onclick = function(event) {
            if (event.target == document.getElementById('loginModal')) closeModal();
        }
        function showReg() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('regForm').style.display = 'block';
        }
        function showLogin() {
            document.getElementById('regForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }
        function doReg() {
            let username = document.getElementById('regUser').value.trim();
            let password = document.getElementById('regPwd').value.trim();
            if (!username || !password) { alert('用户名密码不能为空！'); return; }
            let users = JSON.parse(localStorage.getItem('users')) || [];
            if (users.find(u => u.username === username)) { alert('用户名已存在！'); return; }
            users.push({ username, password });
            localStorage.setItem('users', JSON.stringify(users));
            alert('注册成功！');
            showLogin();
        }
        function doLogin() {
            let username = document.getElementById('loginUser').value.trim();
            let password = document.getElementById('loginPwd').value.trim();
            let users = JSON.parse(localStorage.getItem('users')) || [];
            let user = users.find(u => u.username === username && u.password === password);
            if (user) { alert('登录成功！'); closeModal(); }
            else alert('用户名或密码错误！');
        }
    </script>
</body>
</html>
