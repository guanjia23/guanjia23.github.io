    <h3 id="nature">自然风光</h3>
    <p>春天的校园格外美丽，处处生机盎然。温暖的阳光洒满校园，树木抽出嫩绿的新芽，花草竞相开放，红的、粉的、白的花朵点缀在枝头，微风一吹，阵阵花香扑面而来，让人心旷神怡。道路两旁绿树成荫，小草从土里探出头来，给校园铺上了一层柔软的绿毯。操场上，同学们有的散步聊天，有的安静读书，有的在阳光下奔跑嬉戏，到处都是欢声笑语。清新的空气、明媚的春光、和谐的氛围，让整个校园充满活力与希望，置身其中，让人感到无比舒适与惬意，也让学习生活变得更加美好。</p>
