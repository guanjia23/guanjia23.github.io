<!DOCTYPE html>
<html lang="zh-CN">

</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="./img/logo.jpg" alt="logo">
            <span class="logo-text">doro的书店</span>
        </div>
        <nav class="nav">
            <ul>
                <li><a href="#home">首页</a></li>
                <li><a href="#category">图书分类</a></li>

        </nav>

    <main class="main">
        <!-- 左侧图书分类 -->
        <aside class="left-sidebar" id="category">
            <h3>图书分类导航</h3>
            <ul>
                <li><a href="#">文学小说</a></li>
                <li><a href="#">科技计算机</a></li>
                <li><a href="#">经济管理</a></li>

            <!-- 热门推荐（锚点） -->
            <div class="hot-recommend" id="hot">

                <div class="book-list">
                    <div class="book-item">
                        <img src="./img/1.jpg" alt="图书1">

                    </div>
                    <div class="book-item">
                        <img src="./img/2.jpg" alt="图书2">
                        <p>《算法导论》</p>
                    </div>
                    <div class="book-item">
                        <img src="./img/3.jpg" alt="图书3">
                        <p>《数据结构与算法分析》</p>
                    </div>
                    <div class="book-item">
                        <img src="./img/4.jpg" alt="图书4">
                        <p>《剑来》</p>
                    </div>
                </div>
            </div>

            <div class="new-books" id="new">
                <h3>新书上市</h3>
                <table border="1" cellpadding="8" cellspacing="0">
                    <tr>
                        
                        <th>书名</th>
                        <th>作者</th>
                        <th>价格</th>
                        <th>上架时间</th>
                    </tr>
                    <tr>
                        
                        <td>《网页设计基础与实战》</td>
                        <td>何勇 王瑶</td>
                        <td>¥49.00</td>
                        <td>2026-04-01</td>
                    </tr>
                    <tr>
                        
                        <td>《计算机组成原理》</td>
                        <td>唐朔飞</td>
                        <td>¥59.00</td>
                        <td>2026-04-20</td>
                    </tr>
                    <tr>
    
                        <td>《python教程》</td>
                        <td>三剑客</td>
                        <td>¥49.00</td>
                        <td>2026-04-25</td>
                    </tr>
                </table>
            </div>
        </section>

        <aside class="right-sidebar">
            <h3>促销信息</h3>
            <img src="./img/ad.jpg" alt="广告">
            <p>全场满199减50！</p>
        </aside>
